[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps = 
    adafruit/DHT sensor library@^1.4.4
    adafruit/Adafruit Unified Sensor@^1.1.14
    me-no-dev/ESPAsyncWebServer
    me-no-dev/AsyncTCP
    knolleary/PubSubClient@^2.8